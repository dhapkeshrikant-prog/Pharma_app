<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>
    <linearGradient id="strip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="50%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>
  <!-- Blister pack base -->
  <rect x="20" y="40" width="160" height="120" rx="14" fill="url(#bg)" stroke="#0ea5e9" stroke-width="2.5"/>
  <!-- Brand stripe -->
  <rect x="20" y="40" width="160" height="36" rx="14" fill="url(#strip)"/>
  <rect x="20" y="64" width="160" height="12" fill="url(#strip)"/>
  <!-- Product name -->
  <text x="100" y="66" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="white" letter-spacing="1">SNOFREEZ</text>
  <!-- Tablets in blister -->
  <ellipse cx="52" cy="105" rx="16" ry="10" fill="#0ea5e9" opacity="0.9"/>
  <ellipse cx="100" cy="105" rx="16" ry="10" fill="#0ea5e9" opacity="0.9"/>
  <ellipse cx="148" cy="105" rx="16" ry="10" fill="#0ea5e9" opacity="0.9"/>
  <ellipse cx="52" cy="135" rx="16" ry="10" fill="#38bdf8" opacity="0.85"/>
  <ellipse cx="100" cy="135" rx="16" ry="10" fill="#38bdf8" opacity="0.85"/>
  <ellipse cx="148" cy="135" rx="16" ry="10" fill="#38bdf8" opacity="0.85"/>
  <!-- Score line on each tablet -->
  <line x1="40" y1="105" x2="64" y2="105" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="88" y1="105" x2="112" y2="105" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="136" y1="105" x2="160" y2="105" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="40" y1="135" x2="64" y2="135" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="88" y1="135" x2="112" y2="135" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="136" y1="135" x2="160" y2="135" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <!-- Composition text -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#0369a1">Aceclofenac 100mg + PCM 325mg + PE 5mg</text>
</svg>