<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="syr-body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fee2e2"/>
      <stop offset="100%" style="stop-color:#fecaca"/>
    </linearGradient>
    <linearGradient id="syr-label" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <linearGradient id="syr-liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171" stop-opacity="0.7"/>
      <stop offset="100%" style="stop-color:#dc2626" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <!-- Bottle body -->
  <rect x="60" y="65" width="80" height="135" rx="18" fill="url(#syr-body)" stroke="#dc2626" stroke-width="2"/>
  <!-- Liquid inside -->
  <rect x="62" y="130" width="76" height="68" rx="0 0 16 16" fill="url(#syr-liquid)"/>
  <!-- Neck -->
  <rect x="74" y="40" width="52" height="28" rx="7" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <!-- Cap -->
  <rect x="70" y="24" width="60" height="20" rx="6" fill="#dc2626"/>
  <rect x="76" y="28" width="48" height="9" rx="3.5" fill="#f87171" opacity="0.5"/>
  <!-- Label -->
  <rect x="64" y="82" width="72" height="85" rx="7" fill="white" opacity="0.93"/>
  <rect x="64" y="82" width="72" height="24" rx="7 7 0 0" fill="url(#syr-label)"/>
  <text x="100" y="100" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="white">Cufreez-A</text>
  <text x="100" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#dc2626" font-weight="bold">Ambroxol 15mg</text>
  <text x="100" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#dc2626" font-weight="bold">Guaiphenesin 50mg</text>
  <text x="100" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#dc2626" font-weight="bold">Terbutaline 1.5mg</text>
  <text x="100" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#9f1239">Cough Relief Syrup</text>
  <!-- Measurement lines -->
  <line x1="128" y1="150" x2="134" y2="150" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <line x1="128" y1="160" x2="137" y2="160" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <line x1="128" y1="170" x2="134" y2="170" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <line x1="128" y1="180" x2="137" y2="180" stroke="#dc2626" stroke-width="1" opacity="0.5"/>
  <!-- Shine -->
  <rect x="66" y="68" width="14" height="90" rx="7" fill="white" opacity="0.2"/>
  <!-- Volume label -->
  <text x="100" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#9f1239">100 mL Syrup Bottle</text>
</svg>