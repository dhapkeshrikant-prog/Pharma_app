<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="jar-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="jar-cap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#ca8a04"/>
    </linearGradient>
    <linearGradient id="jar-label" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#ca8a04"/>
    </linearGradient>
    <linearGradient id="powder" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Jar body -->
  <rect x="30" y="80" width="140" height="120" rx="20" fill="url(#jar-bg)" stroke="#ca8a04" stroke-width="2.5"/>
  <!-- Powder inside -->
  <ellipse cx="100" cy="155" rx="65" ry="20" fill="url(#powder)" opacity="0.7"/>
  <!-- Wide cap -->
  <rect x="26" y="52" width="148" height="32" rx="12" fill="url(#jar-cap)"/>
  <rect x="30" y="56" width="140" height="18" rx="8" fill="#d97706" opacity="0.4"/>
  <!-- Label -->
  <rect x="36" y="100" width="128" height="80" rx="10" fill="white" opacity="0.93"/>
  <rect x="36" y="100" width="128" height="26" rx="10 10 0 0" fill="url(#jar-label)"/>
  <text x="100" y="119" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="white">KSHITIZ GRO</text>
  <text x="100" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#92400e" font-weight="bold">Protein Blend</text>
  <text x="100" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#92400e" font-weight="bold">+ Vit. D3 + B Complex</text>
  <text x="100" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#92400e" font-weight="bold">+ Essential Minerals</text>
  <text x="100" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#78350f">Nutritional Powder</text>
  <!-- Logo on cap -->
  <text x="100" y="72" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" fill="white" opacity="0.8">SUKHAYA</text>
  <!-- Shine on jar -->
  <rect x="36" y="84" width="22" height="85" rx="11" fill="white" opacity="0.18"/>
  <!-- Scoop indicator -->
  <text x="100" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#92400e">Includes measuring scoop</text>
</svg>