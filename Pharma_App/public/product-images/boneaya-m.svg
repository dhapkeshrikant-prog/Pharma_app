<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <linearGradient id="strip6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3730a3"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="cap6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
  </defs>
  <!-- Capsule blister design -->
  <rect x="20" y="40" width="160" height="120" rx="14" fill="url(#bg6)" stroke="#3730a3" stroke-width="2.5"/>
  <rect x="20" y="40" width="160" height="36" rx="14" fill="url(#strip6)"/>
  <rect x="20" y="64" width="160" height="12" fill="url(#strip6)"/>
  <text x="100" y="66" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="white" letter-spacing="0.5">BONEAYA M</text>
  <!-- Capsules (two-tone) -->
  <!-- Row 1 -->
  <rect x="36" y="90" width="34" height="18" rx="9" fill="url(#cap6)"/>
  <rect x="36" y="90" width="17" height="18" rx="9 0 0 9" fill="#4f46e5"/>
  <rect x="83" y="90" width="34" height="18" rx="9" fill="url(#cap6)"/>
  <rect x="83" y="90" width="17" height="18" rx="9 0 0 9" fill="#4f46e5"/>
  <rect x="130" y="90" width="34" height="18" rx="9" fill="url(#cap6)"/>
  <rect x="130" y="90" width="17" height="18" rx="9 0 0 9" fill="#4f46e5"/>
  <!-- Row 2 -->
  <rect x="36" y="120" width="34" height="18" rx="9" fill="url(#cap6)"/>
  <rect x="36" y="120" width="17" height="18" rx="9 0 0 9" fill="#6366f1"/>
  <rect x="83" y="120" width="34" height="18" rx="9" fill="url(#cap6)"/>
  <rect x="83" y="120" width="17" height="18" rx="9 0 0 9" fill="#6366f1"/>
  <rect x="130" y="120" width="34" height="18" rx="9" fill="url(#cap6)"/>
  <rect x="130" y="120" width="17" height="18" rx="9 0 0 9" fill="#6366f1"/>
  <!-- Shine on capsules -->
  <ellipse cx="44" cy="94" rx="5" ry="3" fill="white" opacity="0.3"/>
  <ellipse cx="91" cy="94" rx="5" ry="3" fill="white" opacity="0.3"/>
  <ellipse cx="138" cy="94" rx="5" ry="3" fill="white" opacity="0.3"/>
  <ellipse cx="44" cy="124" rx="5" ry="3" fill="white" opacity="0.3"/>
  <ellipse cx="91" cy="124" rx="5" ry="3" fill="white" opacity="0.3"/>
  <ellipse cx="138" cy="124" rx="5" ry="3" fill="white" opacity="0.3"/>
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#312e81">Calcium + Calcitriol + MCB + Folic Acid</text>
</svg>