<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fed7aa"/>
      <stop offset="100%" style="stop-color:#fdba74"/>
    </linearGradient>
    <linearGradient id="label3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c" stop-opacity="0.6"/>
      <stop offset="100%" style="stop-color:#ea580c" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Bottle body -->
  <rect x="55" y="70" width="90" height="130" rx="18" fill="url(#bottle)" stroke="#ea580c" stroke-width="2"/>
  <!-- Liquid fill -->
  <rect x="57" y="130" width="86" height="68" rx="0 0 16 16" fill="url(#liquid)"/>
  <!-- Bottle neck -->
  <rect x="72" y="44" width="56" height="30" rx="8" fill="#fdba74" stroke="#ea580c" stroke-width="1.5"/>
  <!-- Cap -->
  <rect x="68" y="28" width="64" height="22" rx="7" fill="#ea580c"/>
  <rect x="74" y="32" width="52" height="10" rx="4" fill="#fb923c" opacity="0.5"/>
  <!-- Label background -->
  <rect x="60" y="90" width="80" height="80" rx="8" fill="white" opacity="0.92"/>
  <!-- Orange stripe on label -->
  <rect x="60" y="90" width="80" height="22" rx="8 8 0 0" fill="url(#label3)"/>
  <text x="100" y="107" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="white">PANAYA-40</text>
  <text x="100" y="118" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" fill="white">DSR</text>
  <text x="100" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#ea580c" font-weight="bold">Pantoprazole 40mg</text>
  <text x="100" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#ea580c" font-weight="bold">+ Domperidone SR 30mg</text>
  <text x="100" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#9a3412">Gastro Care Capsule</text>
  <!-- Shine -->
  <rect x="65" y="74" width="18" height="80" rx="9" fill="white" opacity="0.18"/>
</svg>